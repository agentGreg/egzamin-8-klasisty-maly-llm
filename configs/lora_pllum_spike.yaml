# LoRA SFT config for the PLLuM 8B 2512 format-not-math spike.
# Trains a low-rank adapter on the 8-bit base (QLoRA-style) over the
# transcribed 2021-2023 CKE sheets. Held-out test (2026 main) is NOT here.
model: "/Users/greg/.cache/huggingface/local-mlx/Llama-PLLuM-8B-instruct-2512-mlx-8bit"
train: true
data: "data/finetune"
adapter_path: "adapters/pllum8_spike"
