num_layers: 16
iters: 300
batch_size: 1
learning_rate: 1.0e-4
steps_per_report: 20
steps_per_eval: 60
save_every: 100
max_seq_length: 2048
seed: 42
lora_parameters:
  rank: 8
  scale: 20.0
  dropout: 0.0
