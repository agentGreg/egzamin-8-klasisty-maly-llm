# LoRA SFT — Bielik-Minitron 7B (control arm), full study, EARLY STOPPING.
# Identical recipe to lora_pllum_full.yaml except the base model + adapter path.
# The strong model: expected to show little format headroom and flat accuracy.
model: "agentGreg/Bielik-Minitron-7B-v3.0-Instruct-MLX-bf16"
train: true
data: "data/finetune"
adapter_path: "adapters/bielik_full"
fine_tune_type: lora
num_layers: 16
iters: 400
batch_size: 1
learning_rate: 1.0e-4
steps_per_report: 25
steps_per_eval: 25
save_every: 25
max_seq_length: 2048
seed: 42
lora_parameters:
  rank: 8
  scale: 20.0
  dropout: 0.05
